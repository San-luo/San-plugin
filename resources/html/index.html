<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            /* 简洁配色方案 */
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --border-color: #e0e0e0;
            --text-primary: #2c3e50;
            --text-secondary: #7f8c8d;
            --accent-color: #3498db;
            --accent-hover: #2980b9;
            --card-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: var(--bg-primary);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            padding: 40px;
            margin: 20px 0;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle-box {
            display: inline-block;
            padding: 6px 20px;
            background: var(--accent-color);
            color: white;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .section {
            margin-bottom: 35px;
        }

        .section-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-indicator {
            width: 8px;
            height: 8px;
            background: var(--accent-color);
            border-radius: 50%;
            margin-right: 12px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* 3列网格布局 */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--card-shadow);
            border-color: var(--accent-color);
        }

        .feature-command {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 15px;
            color: var(--accent-color);
            font-weight: 600;
            margin-bottom: 8px;
            word-break: break-all;
        }

        .feature-command::before {
            content: "▸ ";
            margin-right: 4px;
        }

        .feature-desc {
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid var(--border-color);
            text-align: center;
        }

        .footer-content {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .footer-tag {
            color: var(--accent-color);
            font-weight: 600;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 20px;
            }
        }
    </style>
    <title>San-plugin 帮助中心</title>
</head>
<body>

<div class="container">
    <header>
        <h1>San-Plugin</h1>
        <div class="subtitle-box">功能指令参考</div>
    </header>

    <div id="contentWrapper"></div>

    <footer>
        <div class="footer-content">
            Created by <span class="footer-tag">@散San</span>
        </div>
    </footer>
</div>

<script>
    // 数据保持简洁，适配 3 列展示
    const pluginHelpData = [
        {
            title: "表情系统",
            features: [
                ["#san设置表情添加开启", "开启表情添加功能,重启生效"],
                ["#san设置主人添加", "开启后仅有主人可添加表情"],
                ["#san设置群组分离", "仅触发全局和对应群组表情"],
                ["#添加xxx", "添加随机关键词回复内容"],
                ["#表情列表", "查看所有表情及具体数量"],
                ["#来点xxx", "随机回复10张关键词表情"],
                ["#连续添加xxx", "进入连续添加模式,发#退出"],
                ["#表情删除", "需引用bot所发表情进行删除"],
                ["#表情删除全部xxx", "删除指定关键词全部数据"]
            ]
        },
        {
            title: "气象服务",
            features: [
                ["xxx天气", "实时天气卡片,支持模糊匹配"],
                ["极端天气", "查看全国范围内的预警地区"],
                ["xxx空气", "实时空气质量卡片数据"],
                ["xxx空气排行", "查看对应地区的质量排行"]
            ]
        },
        {
            title: "交互体验",
            features: [
                ["#san戳一戳仅bot", "仅有戳bot才可触发反馈"],
                ["#戳一戳列表", "查看API生效状态列表"],
                ["#戳一戳设置名称 api", "添加自定义戳一戳API路径"],
                ["#戳一戳全部开启", "一键控制所有API生效状态"],
                ["#戳一戳关闭xxx", "针对特定API进行关闭操作"],
                ["#戳一戳全部删除", "清空数据库中所有API配置"]
            ]
        },
        {
            title: "实用工具",
            features: [
                ["#去背景", "获取AI去背后的透明图像"],
                ["#留言", "可向Bot管理员发送留言"],
                ["取", "引用消息获取 e 实例内容"],
                ["#日报", "获取每日60秒新闻简报"],
                ["#日报开启白名单", "将当前群加入推送(主人)"]
            ]
        },
        {
            title: "核心配置",
            features: [
                ["#san设置", "查看详细运行配置信息"],
                ["#san设置图像质量", "设置生成图像质量 (1-100)"],
                ["#san更新", "从仓库拉取最新插件版本"]
            ]
        }
    ];

    function renderHelp() {
        const wrapper = document.getElementById('contentWrapper');
        pluginHelpData.forEach(sectionData => {
            const section = document.createElement('div');
            section.className = 'section';
            
            const header = document.createElement('div');
            header.className = 'section-header';
            header.innerHTML = `<div class="section-indicator"></div><div class="section-title">${sectionData.title}</div>`;
            section.appendChild(header);

            const grid = document.createElement('div');
            grid.className = 'grid';
            sectionData.features.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="feature-command">${item[0]}</div>
                    <div class="feature-desc">${item[1]}</div>
                `;
                grid.appendChild(card);
            });
            section.appendChild(grid);
            wrapper.appendChild(section);
        });
    }
    window.onload = renderHelp;
</script>
</body>
</html>
