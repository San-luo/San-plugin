<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            /* 顶级玻璃态配色方案 */
            --glass-bg: rgba(10, 10, 10, 0.7);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.8);
            --accent-color: #00f2fe;
            --accent-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --card-bg: rgba(255, 255, 255, 0.04);
            --inner-glow: inset 0 0 15px rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        body {
            font-family: 'SF Pro Display', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            /* 背景图支持 */
            background-image: url('../img/background.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-primary);
        }

        /* 背景深度遮罩 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.4) 100%);
            z-index: -1;
        }

        .container {
            width: 95%;
            max-width: 1200px;
            margin: 40px auto;
            padding: 35px 45px; /* 适中的内边距 */
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(170%);
            -webkit-backdrop-filter: blur(25px) saturate(170%);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        h1 {
            font-size: 56px;
            font-weight: 900;
            margin: 0;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 40%, #bbb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle-box {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 18px;
            border-radius: 50px;
            background: var(--accent-gradient);
            color: #000;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .section {
            margin-bottom: 35px;
        }

        .section-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-indicator {
            width: 10px;
            height: 10px;
            background: var(--accent-gradient);
            border-radius: 50%;
            margin-right: 12px;
            box-shadow: 0 0 10px var(--accent-color);
        }

        .section-title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            position: relative;
        }

        /* 强制 3 列布局 */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
        }

        .card {
            background: var(--card-bg);
            box-shadow: var(--inner-glow);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 18px;
            padding: 16px 20px; /* 深度压缩高度 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        /* 顶部装饰微线 */
        .card::after {
            content: "";
            position: absolute;
            top: 0; left: 20%; right: 20%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
        }

        .feature-command {
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 15px;
            color: var(--accent-color);
            font-weight: 700;
            margin-bottom: 6px;
            line-height: 1.3;
            display: flex;
            align-items: flex-start;
        }

        .feature-command::before {
            content: ">";
            margin-right: 6px;
            opacity: 0.4;
        }

        .feature-desc {
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-secondary);
            font-weight: 400;
        }

        footer {
            margin-top: 30px;
            text-align: center;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-content {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
        }

        .footer-tag {
            color: var(--text-primary);
            font-weight: 700;
            background: rgba(255,255,255,0.1);
            padding: 3px 10px;
            border-radius: 5px;
            margin-left: 5px;
        }

        /* 为了确保截图效果，900px 以下才降级为 2 列 */
        @media (max-width: 900px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
    <title>San-plugin Help Center Compact</title>
</head>
<body>

<div class="container">
    <header>
        <h1>SAN PLUGIN</h1>
        <div class="subtitle-box">COMMAND REFERENCE</div>
    </header>

    <div id="contentWrapper"></div>

    <footer>
        <div class="footer-content">
            POWERED BY <span class="footer-tag">@散San</span>
        </div>
    </footer>
</div>

<script>
    // 数据保持简洁，适配 3 列展示
    const pluginHelpData = [
        {
            title: "表情系统",
            features: [
                ["#san设置表情添加开启", "开启表情添加功能,重启生效"],
                ["#san设置主人添加", "开启后仅有主人可添加表情"],
                ["#san设置群组分离", "仅触发全局和对应群组表情"],
                ["#添加xxx", "添加随机关键词回复内容"],
                ["#表情列表", "查看所有表情及具体数量"],
                ["#来点xxx", "随机回复10张关键词表情"],
                ["#连续添加xxx", "进入连续添加模式,发#退出"],
                ["#表情删除", "需引用bot所发表情进行删除"],
                ["#表情删除全部xxx", "删除指定关键词全部数据"]
            ]
        },
        {
            title: "气象服务",
            features: [
                ["xxx天气", "实时天气卡片,支持模糊匹配"],
                ["极端天气", "查看全国范围内的预警地区"],
                ["xxx空气", "实时空气质量卡片数据"],
                ["xxx空气排行", "查看对应地区的质量排行"]
            ]
        },
        {
            title: "交互体验",
            features: [
                ["#san戳一戳仅bot", "仅有戳bot才可触发反馈"],
                ["#戳一戳列表", "查看API生效状态列表"],
                ["#戳一戳设置名称 api", "添加自定义戳一戳API路径"],
                ["#戳一戳全部开启", "一键控制所有API生效状态"],
                ["#戳一戳关闭xxx", "针对特定API进行关闭操作"],
                ["#戳一戳全部删除", "清空数据库中所有API配置"]
            ]
        },
        {
            title: "实用工具",
            features: [
                ["#去背景", "获取AI去背后的透明图像"],
                ["#留言", "可向Bot管理员发送留言"],
                ["取", "引用消息获取 e 实例内容"],
                ["#日报", "获取每日60秒新闻简报"],
                ["#日报开启白名单", "将当前群加入推送(主人)"]
            ]
        },
        {
            title: "核心配置",
            features: [
                ["#san设置", "查看详细运行配置信息"],
                ["#san设置图像质量", "设置生成图像质量 (1-100)"],
                ["#san更新", "从仓库拉取最新插件版本"]
            ]
        }
    ];

    function renderHelp() {
        const wrapper = document.getElementById('contentWrapper');
        pluginHelpData.forEach(sectionData => {
            const section = document.createElement('div');
            section.className = 'section';
            
            const header = document.createElement('div');
            header.className = 'section-header';
            header.innerHTML = `<div class="section-indicator"></div><div class="section-title">${sectionData.title}</div>`;
            section.appendChild(header);

            const grid = document.createElement('div');
            grid.className = 'grid';
            sectionData.features.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="feature-command">${item[0]}</div>
                    <div class="feature-desc">${item[1]}</div>
                `;
                grid.appendChild(card);
            });
            section.appendChild(grid);
            wrapper.appendChild(section);
        });
    }
    window.onload = renderHelp;
</script>
</body>
</html>
